<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Giriş | VHEORA</title>
  <link rel="stylesheet" href="admin.css?v=2">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&family=Cormorant+Garamond:wght@500;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="login-page">
    <div class="login-bg-shapes">
      <div class="login-shape shape-1"></div>
      <div class="login-shape shape-2"></div>
      <div class="login-shape shape-3"></div>
    </div>
    <div class="login-card">
      <div class="login-logo">
        <h1>VHEORA</h1>
        <p>Admin Panel</p>
      </div>
      <div class="login-error" id="loginError"></div>
      <form id="loginForm" autocomplete="on">
        <div class="form-group">
          <label for="username">Kullanıcı Adı</label>
          <div class="login-input-wrap">
            <span class="login-input-icon">👤</span>
            <input type="text" id="username" placeholder="admin" required autocomplete="username">
          </div>
        </div>
        <div class="form-group">
          <label for="password">Şifre</label>
          <div class="login-input-wrap">
            <span class="login-input-icon">🔑</span>
            <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-login" id="loginBtn">
          <span id="loginBtnText">Giriş Yap</span>
          <span class="btn-spinner" id="loginSpinner"></span>
        </button>
        <div class="login-footer">
          <a id="siteLink" href="/" class="login-back-link">← Siteye Dön</a>
          <script>document.getElementById('siteLink').href = API || '/';</script>
        </div>
      </form>
    </div>
  </div>
  <script>
    const API = window.location.protocol === 'file:' ? 'http://localhost:3001' : '';

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('loginError');
      const btn = document.getElementById('loginBtn');
      const btnText = document.getElementById('loginBtnText');
      const spinner = document.getElementById('loginSpinner');

      if (!username || !password) {
        errorEl.textContent = 'Kullanıcı adı ve şifre gerekli.';
        errorEl.style.display = 'block';
        return;
      }

      errorEl.style.display = 'none';
      btn.disabled = true;
      btnText.textContent = 'Giriş yapılıyor...';
      spinner.style.display = 'inline-block';

      try {
        const res = await fetch(`${API}/api/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (!res.ok) {
          errorEl.textContent = data.error || 'Giriş başarısız';
          errorEl.style.display = 'block';
          btn.disabled = false;
          btnText.textContent = 'Giriş Yap';
          spinner.style.display = 'none';
          return;
        }

        localStorage.setItem('vheora_token', data.token);
        localStorage.setItem('vheora_user', data.username);
        window.location.href = `${API}/admin/dashboard.html`;
      } catch (err) {
        console.error('[Login Error]', err);
        errorEl.textContent = 'Sunucuya bağlanılamadı. (Sunucu çalışıyor mu? Aynı ağda mısınız?)';
        errorEl.style.display = 'block';
        btn.disabled = false;
        btnText.textContent = 'Giriş Yap';
        spinner.style.display = 'none';
      }
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && document.activeElement?.tagName !== 'INPUT') {
        document.getElementById('username').focus();
      }
    });
  </script>
</body>
</html>
