<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yorumlar | VHEORA Admin</title>
  <link rel="stylesheet" href="admin.css?v=2">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&family=Cormorant+Garamond:wght@500;600&display=swap" rel="stylesheet">
</head>
<body>
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main-content">
    <div class="page-header">
      <div>
        <h1 class="page-title">Yorumlar</h1>
        <p class="page-subtitle">Müşteri yorumlarını yönetin ve onaylayın.</p>
      </div>
    </div>
    <div class="table-container" id="testimonialsContainer">
      <p class="empty-state">Yükleniyor...</p>
    </div>
  </main>

  <script>
    const API = window.location.protocol === 'file:' ? 'http://localhost:3001' : '';

    function getToken() {
      const t = localStorage.getItem('vheora_token');
      if (!t) window.location.href = '/admin/';
      return t;
    }

    document.getElementById('sidebar').innerHTML = `
      <div class="sidebar-logo">VHEORA</div>
      <div class="sidebar-sub">Admin Panel</div>
      <nav class="sidebar-nav">
        <a href="/admin/dashboard.html" class="sidebar-link">📊 Dashboard</a>
        <a href="/admin/products.html" class="sidebar-link">💎 Ürünler</a>
        <a href="/admin/messages.html" class="sidebar-link">✉️ Mesajlar</a>
        <a href="/admin/testimonials.html" class="sidebar-link active">⭐ Yorumlar</a>
        <a href="/admin/logs.html" class="sidebar-link">📋 Loglar</a>
        <a href="/" class="sidebar-link">🌐 Siteye Git</a>
      </nav>
      <button class="sidebar-logout" onclick="logout()">🚪 Çıkış Yap</button>
    `;

    document.body.insertAdjacentHTML('afterbegin', '<div class="sidebar-overlay" onclick="closeSidebar()"></div>');
    document.body.insertAdjacentHTML('afterbegin', '<button class="sidebar-toggle" onclick="toggleSidebar()" aria-label="Menuyu ac/kapat">☰</button>');

    function toggleSidebar() {
      document.body.classList.toggle('sidebar-open');
    }

    function closeSidebar() {
      document.body.classList.remove('sidebar-open');
    }

    function logout() {
      localStorage.removeItem('vheora_token');
      window.location.href = '/admin/';
    }

    async function approveTestimonial(id) {
      const token = getToken();
      await fetch(`${API}/api/admin/testimonials/${id}/approve`, {
        method: 'PUT', headers: { 'Authorization': `Bearer ${token}` }
      });
      loadTestimonials();
    }

    async function deleteTestimonial(id) {
      if (!confirm('Yorumu sil?')) return;
      const token = getToken();
      await fetch(`${API}/api/admin/testimonials/${id}`, {
        method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` }
      });
      loadTestimonials();
    }

    async function loadTestimonials() {
      const container = document.getElementById('testimonialsContainer');
      const token = getToken();
      try {
        const res = await fetch(`${API}/api/admin/testimonials`, { headers: { 'Authorization': `Bearer ${token}` } });
        const testimonials = await res.json();

        if (!testimonials.length) {
          container.innerHTML = '<p class="empty-state">Henüz yorum yok.</p>';
          return;
        }

        container.innerHTML = `
          <table>
            <thead><tr><th>Tarih</th><th>İsim</th><th>Lokasyon</th><th>Yorum</th><th>Puan</th><th>Durum</th><th style="text-align:right;">İşlem</th></tr></thead>
            <tbody>
              ${testimonials.map(t => `
                <tr>
                  <td style="color:var(--gray);font-size:0.8rem;">${new Date(t.created_at).toLocaleDateString('tr-TR')}</td>
                  <td style="font-weight:500;">${t.name}</td>
                  <td style="color:var(--gray);">${t.location || '-'}</td>
                  <td style="max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--gray);">${t.text.substring(0, 80)}${t.text.length > 80 ? '...' : ''}</td>
                  <td>${'★'.repeat(t.rating)}</td>
                  <td><span class="badge ${t.is_approved ? 'badge-green' : 'badge-red'}">${t.is_approved ? 'Onaylı' : 'Bekliyor'}</span></td>
                  <td style="text-align:right;">
                    ${!t.is_approved ? `<button class="btn btn-sm btn-primary" onclick="approveTestimonial(${t.id})">✓ Onayla</button>` : ''}
                    <button class="btn btn-sm btn-danger" onclick="deleteTestimonial(${t.id})">🗑️</button>
                  </td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        `;
      } catch (err) {
        container.innerHTML = '<p class="empty-state">Sunucuya bağlanılamadı.</p>';
      }
    }

    loadTestimonials();
  </script>
</body>
</html>
